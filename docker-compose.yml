version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: event_db
    restart: always
    environment:
      MYSQL_DATABASE: event_platform
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"